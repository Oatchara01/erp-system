opcache.enable=0
memory_limit = 2048M
upload_max_filesize = 1024M
post_max_size = 1024M
max_execution_time=30
max_input_time=30

##ปิดเขียน log##
error_reporting=0
display_errors=0
log_errors=0
display_startup_errors=0
log_errors_max_len=0
error_log=0
ignore_repeated_errors=1
ignore_repeated_source=1